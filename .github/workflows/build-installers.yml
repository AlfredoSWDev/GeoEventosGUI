name: Build Installers

on:
  push:
    tags:
      - 'v[0-9]*.*.*-*-alfa'
      - 'v[0-9]*.*.*-*-beta'
      - 'v[0-9]*.*.*-*-stable'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Linux RPM (Fedora / RHEL) ─────────────────────────────────────────────
  build-rpm:
    name: Linux RPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Install rpm-build
        run: sudo apt-get install -y rpm

      - name: Extract numeric version for jpackage
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Convierte v2026.III.13-stable → 2026.3.13
          NUMERIC=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*$//' \
            | sed 's/I\{4\}/4/g; s/I\{3\}/3/g; s/I\{2\}/2/g' \
            | sed 's/IX/9/g; s/VIII/8/g; s/VII/7/g; s/VI/6/g; s/V/5/g; s/IV/4/g; s/III/3/g; s/II/2/g; s/^I$/1/g; s/\.I\./\.1\./g')
          echo "numeric=$NUMERIC" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy libs to jpackage-input
        run: cp -r target/libs target/jpackage-input/libs

      - name: Generate RPM installer
        run: |
          jpackage \
            --type rpm \
            --name "GeoEventos" \
            --app-version "${{ steps.version.outputs.numeric }}" \
            --vendor "Alfredo" \
            --description "GeoEventos Desktop - Gestión de eventos con geolocalización" \
            --input target/jpackage-input \
            --main-jar GeoEventosDesktop.jar \
            --main-class com.alfredo.Main \
            --dest target/installer \
            --module-path target/libs \
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED" \
            --java-options "-XX:+EnableDynamicAgentLoading" \
            --icon src/main/resources/icons/icon.png

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-rpm
          path: target/installer/*.rpm

  # ── Linux DEB (Ubuntu / Debian) ───────────────────────────────────────────
  build-deb:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Extract numeric version for jpackage
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          NUMERIC=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*$//' \
            | sed 's/IX/9/g; s/VIII/8/g; s/VII/7/g; s/VI/6/g; s/V/5/g; s/IV/4/g; s/III/3/g; s/II/2/g; s/\.I\./\.1\./g')
          echo "numeric=$NUMERIC" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy libs to jpackage-input
        run: cp -r target/libs target/jpackage-input/libs

      - name: Generate DEB installer
        run: |
          jpackage \
            --type deb \
            --name "GeoEventos" \
            --app-version "${{ steps.version.outputs.numeric }}" \
            --vendor "Alfredo" \
            --description "GeoEventos Desktop - Gestión de eventos con geolocalización" \
            --input target/jpackage-input \
            --main-jar GeoEventosDesktop.jar \
            --main-class com.alfredo.Main \
            --dest target/installer \
            --module-path target/libs \
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED" \
            --java-options "-XX:+EnableDynamicAgentLoading" \
            --icon src/main/resources/icons/icon.png

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-deb
          path: target/installer/*.deb

  # ── Windows EXE ───────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Extract numeric version for jpackage
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NUMERIC=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*$//' \
            | sed 's/IX/9/g; s/VIII/8/g; s/VII/7/g; s/VI/6/g; s/V/5/g; s/IV/4/g; s/III/3/g; s/II/2/g; s/\.I\./\.1\./g')
          # Windows Installer exige que el major sea <= 255, recortamos a 2 dígitos (2026 → 26)
          WIN=$(echo "$NUMERIC" | sed 's/^\([0-9]\{2\}\)\([0-9]\{2\}\)\./\2./')
          echo "numeric=$WIN" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy libs to jpackage-input
        run: Copy-Item -Recurse target\libs target\jpackage-input\libs
        shell: pwsh

      - name: Generate EXE installer
        run: |
          jpackage `
            --type exe `
            --name "GeoEventos" `
            --app-version "${{ steps.version.outputs.numeric }}" `
            --vendor "Alfredo" `
            --description "GeoEventos Desktop - Gestión de eventos con geolocalización" `
            --input target\jpackage-input `
            --main-jar GeoEventosDesktop.jar `
            --main-class com.alfredo.Main `
            --dest target\installer `
            --module-path target\libs `
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" `
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED" `
            --java-options "-XX:+EnableDynamicAgentLoading" `
            --win-menu `
            --win-shortcut `
            --icon src\main\resources\icons\icon.ico
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: target\installer\*.exe

  # ── macOS PKG ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS PKG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Extract numeric version for jpackage
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          NUMERIC=$(echo "$TAG" | sed 's/^v//' | sed 's/-.*$//' \
            | sed 's/IX/9/g; s/VIII/8/g; s/VII/7/g; s/VI/6/g; s/V/5/g; s/IV/4/g; s/III/3/g; s/II/2/g; s/\.I\./\.1\./g')
          echo "numeric=$NUMERIC" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy libs to jpackage-input
        run: cp -r target/libs target/jpackage-input/libs

      - name: Generate PKG installer
        run: |
          jpackage \
            --type pkg \
            --name "GeoEventos" \
            --app-version "${{ steps.version.outputs.numeric }}" \
            --vendor "Alfredo" \
            --description "GeoEventos Desktop - Gestión de eventos con geolocalización" \
            --input target/jpackage-input \
            --main-jar GeoEventosDesktop.jar \
            --main-class com.alfredo.Main \
            --dest target/installer \
            --module-path target/libs \
            --java-options "--add-opens java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens java.base/java.util=ALL-UNNAMED" \
            --java-options "-XX:+EnableDynamicAgentLoading" \
            --icon src/main/resources/icons/icon.icns

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: target/installer/*.pkg

  # ── Crear GitHub Release con los 4 instaladores ───────────────────────────
  release:
    name: Create Release
    needs: [build-rpm, build-deb, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Set prerelease flag
        id: flags
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-stable" ]] && [[ "$TAG" =~ -[0-9]+-stable$ ]]; then
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GeoEventos Desktop ${{ github.ref_name }}"
          prerelease: ${{ steps.flags.outputs.prerelease == 'true' }}
          body: |
            ## GeoEventos Desktop ${{ github.ref_name }}

            ### Descargas
            | Plataforma | Archivo |
            |------------|---------|
            | 🐧 Fedora / RHEL | `.rpm` |
            | 🐧 Ubuntu / Debian | `.deb` |
            | 🪟 Windows | `.exe` |
            | 🍎 macOS | `.pkg` |

            ### Instalación
            - **Fedora/RHEL:** `sudo dnf install geoeventosdesktop-*.rpm`
            - **Ubuntu/Debian:** `sudo apt install ./geoeventosdesktop_*.deb`
            - **Windows:** ejecuta el `.exe` como administrador
            - **macOS:** abre el `.pkg` y sigue el asistente
          files: |
            installers/installer-rpm/*.rpm
            installers/installer-deb/*.deb
            installers/installer-windows/*.exe
            installers/installer-macos/*.pkg
